name: androdart_studio
description: "A lightweight Flutter IDE for Android — no root required."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  provider: ^6.1.2

  # Code Editor
  re_editor: ^0.10.0
  re_highlight: ^0.0.3

  # Terminal
  xterm: ^4.0.0

  # Network / Downloads
  http: ^1.2.2

  # Archive extraction
  archive: ^4.0.2

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.4
  saf: ^1.0.4
  permission_handler: ^12.0.3

  # Root shell (optional, fallback when root available)
  # libsu is added via Gradle (Java/Kotlin only)

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/setup.sh
