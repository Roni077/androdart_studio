name: Android Build

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-debug:
    name: Build Debug
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - name: Build Debug APK
        run: flutter build apk --debug --split-per-abi
      - name: Rename and Filter APKs
        run: |
          mkdir -p build/filtered_apks
          for apk in build/app/outputs/flutter-apk/app-*-debug.apk; do
            if [[ "$apk" != *"x86_64"* ]]; then
              arch=$(basename "$apk" | sed 's/app-\(.*\)-debug.apk/\1/')
              mv "$apk" "build/filtered_apks/androdart_studio_${arch}_debug.apk"
            fi
          done
      - name: Upload arm64-v8a Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: androdart_studio-debug-arm64-v8a
          path: build/filtered_apks/androdart_studio_arm64-v8a_debug.apk
      - name: Upload armeabi-v7a Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: androdart_studio-debug-armeabi-v7a
          path: build/filtered_apks/androdart_studio_armeabi-v7a_debug.apk

  build-release:
    name: Build Release
    needs: build-debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      
      - name: Setup Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$ENCODED_KEYSTORE" | base64 --decode > android/app/upload-keystore.jks
          cat <<EOF > android/key.properties
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          
      - name: Build Release APK
        run: flutter build apk --release --split-per-abi
        
      - name: Rename and Filter APKs
        run: |
          mkdir -p build/filtered_apks
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            if [[ "$apk" != *"x86_64"* ]]; then
              arch=$(basename "$apk" | sed 's/app-\(.*\)-release.apk/\1/')
              mv "$apk" "build/filtered_apks/androdart_studio_${arch}_release.apk"
            fi
          done
          
      - name: Upload arm64-v8a Release APK
        uses: actions/upload-artifact@v4
        with:
          name: androdart_studio-release-arm64-v8a
          path: build/filtered_apks/androdart_studio_arm64-v8a_release.apk
          
      - name: Upload armeabi-v7a Release APK
        uses: actions/upload-artifact@v4
        with:
          name: androdart_studio-release-armeabi-v7a
          path: build/filtered_apks/androdart_studio_armeabi-v7a_release.apk
